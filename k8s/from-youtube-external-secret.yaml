apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: from-youtube-secrets
  namespace: mirrorfm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: from-youtube-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /homeplane/from-youtube

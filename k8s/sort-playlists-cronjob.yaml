apiVersion: batch/v1
kind: CronJob
metadata:
  name: sort-playlists
  namespace: mirrorfm
spec:
  schedule: "0 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sort-playlists
              image: mirrorfm-core:latest
              imagePullPolicy: Never
              command: ["/app/sort-playlists/sort-playlists"]
              envFrom:
                - secretRef:
                    name: sort-playlists-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

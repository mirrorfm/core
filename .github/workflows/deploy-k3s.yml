# Builds 4 separate Docker images for mirror.fm workers,
# imports them into k3s, and syncs via ArgoCD.
# Also deploys to Lambda as fallback.

name: Deploy to k3s

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-k3s:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and import images
        run: |
          for func in from-youtube from-discogs to-spotify manage-playlists; do
            echo "=== Building mirrorfm-${func} ==="
            docker build -t mirrorfm-${func}:latest -f functions/${func}/Dockerfile.k8s .
            docker save mirrorfm-${func}:latest | sudo k3s ctr images import -
          done

      - name: Register with ArgoCD
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: mirrorfm-core
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/mirrorfm/core.git
              targetRevision: master
              path: k8s
            destination:
              server: https://kubernetes.default.svc
              namespace: mirrorfm
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
          EOF

      - name: Restart deployments
        run: |
          for deploy in from-youtube from-discogs to-spotify; do
            kubectl rollout restart deployment/${deploy} -n mirrorfm || true
          done
          echo "Deploy complete. CronJob manage-playlists will use new image on next run."

  deploy-lambda-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for arm64 builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get AWS account ID
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ steps.aws.outputs.account_id }}.dkr.ecr.eu-west-1.amazonaws.com

      - name: Build, push, and update Lambda functions
        run: |
          ACCOUNT_ID=${{ steps.aws.outputs.account_id }}
          declare -A LAMBDA_NAMES=(
            [from-youtube]=mirror-fm_from-youtube
            [from-discogs]=mirror-fm_from-discogs
            [to-spotify]=mirror-fm_to-spotify
            [manage-playlists]=mirror-fm_manage-playlists
          )
          declare -A SECRET_NAMES=(
            [from-youtube]=homeplane/from-youtube
            [from-discogs]=homeplane/from-discogs
            [to-spotify]=homeplane/to-spotify
            [manage-playlists]=homeplane/manage-playlists
          )
          for func in "${!LAMBDA_NAMES[@]}"; do
            LAMBDA=${LAMBDA_NAMES[$func]}
            echo "=== Deploying ${func} to Lambda fallback (${LAMBDA}) ==="
            IMAGE=${ACCOUNT_ID}.dkr.ecr.eu-west-1.amazonaws.com/${func}:latest
            docker buildx build --platform linux/arm64 --provenance=false --output type=docker \
              -t ${func} -f functions/${func}/Dockerfile.aws functions/${func}
            docker tag ${func}:latest ${IMAGE}
            docker push ${IMAGE}
            aws lambda update-function-code \
              --function-name ${LAMBDA} \
              --image-uri ${IMAGE} \
              --region eu-west-1 || echo "Warning: Lambda code update failed for ${func}"
            # Sync env vars from Secrets Manager (same source as k3s)
            SECRET=${SECRET_NAMES[$func]}
            ENV_JSON=$(aws secretsmanager get-secret-value --secret-id ${SECRET} --region eu-west-1 --query SecretString --output text)
            ENV_VARS=$(echo "$ENV_JSON" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); filtered={k:v for k,v in d.items() if not k.startswith('AWS_')}; print(json.dumps({'Variables': filtered}))")
            aws lambda update-function-configuration \
              --function-name ${LAMBDA} \
              --environment "$ENV_VARS" \
              --region eu-west-1 > /dev/null || echo "Warning: Lambda env update failed for ${func}"
            echo "Synced env vars for ${func}"
          done

# Triggers homeplane to build and deploy k3s images.
# Homeplane's self-hosted runner reads homeplane.yaml, builds all images,
# imports into k3s, and registers with ArgoCD.

name: Deploy to k3s

on:
  push:
    branches: [master, marketplace]
  workflow_dispatch:

concurrency:
  group: deploy-k3s
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homeplane deploy
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            https://api.github.com/repos/stephanebruckert/homeplane/dispatches \
            -H "Authorization: token ${{ secrets.HOMEPLANE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"event_type":"deploy","client_payload":{"repo":"mirrorfm/core","ref":"${{ github.ref_name }}"}}')
          if [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Homeplane dispatch failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Triggered homeplane deploy"

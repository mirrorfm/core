# Builds 4 separate Docker images for mirror.fm workers,
# imports them into k3s, and syncs via ArgoCD.

name: Deploy to k3s

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and import images
        run: |
          for func in from-youtube from-discogs to-spotify manage-playlists; do
            echo "=== Building mirrorfm-${func} ==="
            docker build -t mirrorfm-${func}:latest -f functions/${func}/Dockerfile.k8s .
            docker save mirrorfm-${func}:latest | sudo k3s ctr images import -
          done

      - name: Register with ArgoCD
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: mirrorfm-core
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/mirrorfm/core.git
              targetRevision: master
              path: k8s
            destination:
              server: https://kubernetes.default.svc
              namespace: mirrorfm
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
          EOF

      - name: Restart deployments
        run: |
          for deploy in from-youtube from-discogs to-spotify; do
            kubectl rollout restart deployment/${deploy} -n mirrorfm || true
          done
          echo "Deploy complete. CronJob manage-playlists will use new image on next run."

      - name: Update Lambda fallback images
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          for func in from-youtube from-discogs to-spotify; do
            echo "=== Deploying ${func} to Lambda fallback ==="
            IMAGE=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${func}:latest
            docker buildx build --platform linux/arm64 --provenance=false --output type=docker \
              -t ${func} -f functions/${func}/Dockerfile.aws functions/${func}
            docker tag ${func}:latest ${IMAGE}
            docker push ${IMAGE}
            aws lambda update-function-code \
              --function-name mirror-fm_${func} \
              --image-uri ${IMAGE} \
              --region ${AWS_REGION} || echo "Warning: Lambda update failed for ${func}"
          done
